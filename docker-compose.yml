services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=3001
      - CORS_ORIGINS=http://localhost,http://localhost:80
    expose:
      - "3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend
